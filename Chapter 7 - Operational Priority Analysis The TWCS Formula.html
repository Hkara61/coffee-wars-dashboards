function el(tag,css,html){

function buildFormulaSection(){
  var wrap = el('div','margin-bottom:24px');

  // Formula display
  var fbox = el('div','background:#1a1a2e;color:#e0e0e0;border-radius:10px;padding:20px 24px;margin-bottom:20px;font-family:Georgia,serif');
  fbox.innerHTML = '<div style="font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">The TWCS Formula</div>'
    + '<div style="font-size:14px;color:#fff;text-align:center;padding:10px 0 14px;border-bottom:1px solid #333;margin-bottom:14px">'
    + 'S<sub style="font-size:11px">k,t</sub> = &minus;( |ABSA<sup>neg</sup><sub>k,t</sub>| &times; %Flag<sup>neg</sup><sub>k,t</sub> &minus; ABSA<sup>pos</sup><sub>k,t</sub> &times; %Flag<sup>pos</sup><sub>k,t</sub> )'
    + '</div>'
    + '<div style="font-size:14px;color:#fff;text-align:center;padding:6px 0 14px;border-bottom:1px solid #333;margin-bottom:14px">'
    + 'TWCS<sub style="font-size:11px">k</sub> = &Sigma;<sub style="font-size:10px">t</sub> S<sub style="font-size:10px">k,t</sub> &times; &rho;<sub style="font-size:10px">k</sub><sup style="font-size:10px">&Delta;t</sup>'
    + '</div>'
    + '<div style="font-size:14px;color:#fff;text-align:center;padding:6px 0">'
    + 'PS<sub style="font-size:11px">k</sub> = |TWCS<sub style="font-size:10px">k</sub>| &divide; C<sub style="font-size:10px">k</sub>'
    + '</div>';
  wrap.appendChild(fbox);

  // Parameter explanations
  var params = [
    {sym:'|ABSA<sup>neg</sup><sub>k,t</sub>|', color:'#c0392b', title:'Negative ABSA Intensity',
     why:'Measures how strongly customers feel about a bad experience in this topic. Comes from NLP sentiment scoring. Absolute value taken — higher means stronger complaint.'},
    {sym:'%Flag<sup>neg</sup><sub>k,t</sub>', color:'#c0392b', title:'Negative Flag Rate',
     why:'Share of total reviews that month mentioning this topic negatively. Captures how widespread the problem is — not just how bad it feels.'},
    {sym:'ABSA<sup>pos</sup><sub>k,t</sub>', color:'#27ae60', title:'Positive ABSA Intensity',
     why:'Average sentiment of reviews praising this topic. Subtracting it from the negative side prevents penalising topics that also generate strong positive reactions.'},
    {sym:'%Flag<sup>pos</sup><sub>k,t</sub>', color:'#27ae60', title:'Positive Flag Rate',
     why:'Share of reviews praising this topic that month. Together with positive ABSA, this forms the praise offset — the more customers praise a topic, the less urgent the problem.'},
    {sym:'&rho;<sub>k</sub><sup>&Delta;t</sup>', color:'#1a6bb5', title:'Time-Decay Weight',
     why:'AR(1) parameter estimated from sector data. Older months receive exponentially less weight. &rho;=0.25 means last month carries 25% weight, two months ago 6%, three months ago 1.5% — recent experience dominates.'},
    {sym:'C<sub>k</sub>', color:'#7F77DD', title:'Cost Estimate',
     why:'Entered by the user. Normalises TWCS by how expensive the fix is. A cheap fix with moderate TWCS outranks an expensive fix with high TWCS. This is the only non-data input in the model.'},
  ];

  var pgrid = el('div','display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px');
  params.forEach(function(p){
    var card = el('div','background:#f8f8f6;border-radius:8px;padding:12px 14px;border-left:3px solid '+p.color);
    card.innerHTML = '<div style="font-size:13px;color:'+p.color+';font-family:Georgia,serif;margin-bottom:4px">'+p.sym+'</div>'
      + '<div style="font-size:11px;font-weight:700;color:#1a1a2e;margin-bottom:5px">'+p.title+'</div>'
      + '<div style="font-size:11px;color:#555;line-height:1.6">'+p.why+'</div>';
    pgrid.appendChild(card);
  });
  wrap.appendChild(pgrid);

  // Why not regression
  var regBox = el('div','background:#fff8e1;border-left:4px solid #EF9F27;border-radius:0 8px 8px 0;padding:12px 16px;margin-bottom:20px;font-size:12px;color:#555;line-height:1.7');
  regBox.innerHTML = '<b style="color:#b8830a">Why is the regression coefficient (&beta;) not in the formula?</b><br>'
    + 'The OLS regression (Chapter 6) measures each topic&#39;s effect on overall satisfaction. However, ABSA and &beta; both derive from the same source — overall customer sentiment. Multiplying them would double-count the same dimension and artificially inflate topics with high &beta; values (Staff Service turned spuriously positive in testing). '
    + '&beta; is used separately in Chapter 6 to answer "if we fix this topic, how much does overall satisfaction improve?" — a complementary question, not the same one.';
  wrap.appendChild(regBox);

  return wrap;
}

function buildRhoTable(brand){
  var bd = TD.data[brand];
  var wrap = el('div','margin-bottom:20px');

  var title = el('div','font-size:13px;font-weight:700;color:#1a1a2e;margin-bottom:10px');
  title.textContent = 'Temporal decay parameters (rho_k) — ' + brand;
  wrap.appendChild(title);

  var tbl = document.createElement('table');
  tbl.style.cssText = 'width:100%;border-collapse:collapse;font-size:12px;margin-bottom:8px';
  tbl.innerHTML = '<thead><tr style="background:#f4f4f0"><th style="padding:7px 10px">Topic</th>'
    + '<th style="padding:7px 10px;text-align:center">&rho;<sub>k</sub></th>'
    + '<th style="padding:7px 10px;text-align:center">Half-life (months)</th>'
    + '<th style="padding:7px 10px;text-align:center">Half-life (days)</th>'
    + '<th style="padding:7px 10px">Source</th>'
    + '</tr></thead><tbody>';

  TL.forEach(function(t){
    var d = bd[t];
    var hl = (-Math.log(2)/Math.log(d.rho_k)).toFixed(2);
    var hlD = Math.round(-Math.log(2)/Math.log(d.rho_k)*30);
    var isTopic = d.rho_source.indexOf('topic')===0;
    tbl.innerHTML += '<tr style="border-bottom:1px solid #f0f0ee">'
      + '<td style="padding:6px 10px;font-weight:600;color:'+TC[t]+'">'+t+'</td>'
      + '<td style="padding:6px 10px;text-align:center;font-weight:700">'+d.rho_k+'</td>'
      + '<td style="padding:6px 10px;text-align:center">'+hl+'</td>'
      + '<td style="padding:6px 10px;text-align:center">~'+hlD+' days</td>'
      + '<td style="padding:6px 10px"><span class="badge" style="background:'+(isTopic?'#eaf6f1':'#f0f0ee')+';color:'+(isTopic?'#1a7a4a':'#888')+'">'+(isTopic?'Topic AR(1)':'Sector AR(1)*')+'</span></td>'
      + '</tr>';
  });
  tbl.innerHTML += '</tbody>';

  var note = el('p','font-size:11px;color:#888;margin:4px 0 0');
  note.textContent = '* Topic-level AR(1) did not reach significance (p>0.10). Sector panel value used (N=452, p<0.001, rho='+TD.rho_sector+').';
  wrap.appendChild(tbl);
  wrap.appendChild(note);
  return wrap;
}

function buildPriorityTool(brand, uid){

  // Cost inputs

  costNote.innerHTML = 'Enter the estimated <b>percentage of total budget</b> required to address each topic (e.g. 5 = 5% of budget). Priority Score = |TWCS| &divide; (budget% &divide; 100). A topic that needs less budget but has a high TWCS score ranks higher. All values must be between 0.1 and 100.';
  var grid = el('div','display:grid;grid-template-columns:repeat(5,1fr);gap:8px');

  TL.forEach(function(t){
    var cell = el('div','background:#f8f8f6;border-radius:7px;padding:7px 9px');

    lbl.textContent = t;
    var inp = document.createElement('input');
    inp.type='number'; inp.min='0.1'; inp.max='100'; inp.step='0.1'; inp.value=gc(brand,t); inp.placeholder='%';
    inp.style.cssText='width:100%;border:1px solid #ddd;border-radius:4px;padding:3px 6px;font-size:12px;box-sizing:border-box';
    inp.dataset.brand=brand; inp.dataset.topic=t; inp.dataset.uid=uid;
    inp.addEventListener('input',function(){
      if(!COSTS[this.dataset.brand])COSTS[this.dataset.brand]={};
      COSTS[this.dataset.brand][this.dataset.topic]=parseFloat(this.value)||1;
      rebuildTable(this.dataset.brand, this.dataset.uid);
    });
    var pct = document.createElement('span');
    pct.style.cssText = 'font-size:11px;color:#888;margin-left:3px';
    pct.textContent = '%';
    cell.appendChild(lbl);
    var inpWrap = document.createElement('div');
    inpWrap.style.cssText = 'display:flex;align-items:center;gap:3px';
    inpWrap.appendChild(inp); inpWrap.appendChild(pct);
    cell.appendChild(inpWrap);
    grid.appendChild(cell);
  });
  costBox.appendChild(costTitle); costBox.appendChild(costNote); costBox.appendChild(grid);
  wrap.appendChild(costBox);

  // Table placeholder
  var tblWrap = el('div','');
  tblWrap.id = uid+'-tbl';
  wrap.appendChild(tblWrap);

  // Detail placeholder
  var detWrap = el('div','margin-top:16px');
  detWrap.id = uid+'-det';
  wrap.appendChild(detWrap);

  rebuildTable(brand, uid);
  return wrap;
}

function rebuildTable(brand, uid){
  var bd = TD.data[brand];
  var wrap = document.getElementById(uid+'-tbl');
  if(!wrap)return;
  while(wrap.firstChild)wrap.removeChild(wrap.firstChild);

  var sorted = TL.slice().sort(function(a,b){
    var pa = bd[a].twcs<0?Math.abs(bd[a].twcs)/(gc(brand,a)/100):0;
    var pb = bd[b].twcs<0?Math.abs(bd[b].twcs)/(gc(brand,b)/100):0;
    return pb-pa;
  });

  var maxPS=0;
  TL.forEach(function(t){
    if(bd[t].twcs<0){ var ps=Math.abs(bd[t].twcs)/(gc(brand,t)/100); if(ps>maxPS)maxPS=ps; }
  });

  var title2 = el('div','font-size:13px;font-weight:700;color:#1a1a2e;margin-bottom:10px');
  title2.textContent = 'Step 2 — Priority ranking (click a row for step-by-step breakdown)';
  wrap.appendChild(title2);

  var tbl = document.createElement('table');
  tbl.style.cssText='width:100%;border-collapse:collapse;font-size:12px;border:1px solid #e8e8e5;border-radius:10px;overflow:hidden';
  tbl.innerHTML='<thead><tr style="background:#f4f4f0;border-bottom:2px solid #ddd">'
    +'<th style="padding:8px 10px">#</th>'
    +'<th style="padding:8px 10px">Topic</th>'
    +'<th style="padding:8px 10px;text-align:center">&rho;<sub>k</sub></th>'
    +'<th style="padding:8px 10px;text-align:center">TWCS</th>'
    +'<th style="padding:8px 10px;text-align:center">Cost C<sub>k</sub></th>'
    +'<th style="padding:8px 10px;text-align:center">Priority Score<br><small style="font-weight:400">|TWCS|&divide;(budget%&divide;100)</small></th>'
    +'<th style="padding:8px 10px">Impact Bar</th>'
    +'</tr></thead>';

  var tbody = document.createElement('tbody');
  sorted.forEach(function(t,ri){
    var d=bd[t]; var c=gc(brand,t);
    var ps=d.twcs<0?Math.abs(d.twcs)/(c/100):0;
    var barW=maxPS>0?Math.round(ps/maxPS*100):0;
    var tc=d.twcs<0?'#c0392b':'#27ae60';
    var isTopic=d.rho_source.indexOf('topic')===0;

    var tr=document.createElement('tr');
    tr.style.cssText='border-bottom:1px solid #f0f0ee;cursor:pointer';
    tr.dataset.brand=brand; tr.dataset.topic=t; tr.dataset.uid=uid;
    tr.innerHTML='<td style="padding:7px 10px;color:#999;font-weight:700">'+(ri+1)+'</td>'
      +'<td style="padding:7px 10px;font-weight:700;color:'+TC[t]+'">'+t+'</td>'
      +'<td style="padding:7px 10px;text-align:center">'+d.rho_k
        +'<span class="badge" style="background:'+(isTopic?'#eaf6f1':'#f0f0ee')+';color:'+(isTopic?'#1a7a4a':'#888')+'">'+(isTopic?'topic':'sector')+'</span></td>'
      +'<td style="padding:7px 10px;text-align:center;font-weight:700;color:'+tc+'">'+d.twcs.toFixed(4)+'</td>'
      +'<td style="padding:7px 10px;text-align:center">'+c+'</td>'
      +'<td style="padding:7px 10px;text-align:center;font-weight:700;color:#1a6bb5">'+(d.twcs<0?ps.toFixed(4):'&#10003; Positive')+'</td>'
      +'<td style="padding:7px 10px;min-width:100px">'
        +(d.twcs<0?'<div style="background:#e8f0fd;border-radius:3px;height:8px"><div style="background:#1a6bb5;height:8px;border-radius:3px;width:'+barW+'%"></div></div>':'')
        +'</td>';

    tr.addEventListener('mouseover',function(){this.style.background='#f8f8f6';});
    tr.addEventListener('mouseout',function(){this.style.background='';});
    tr.addEventListener('click',function(){
      showDetail(this.dataset.brand,this.dataset.topic,this.dataset.uid);
    });
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);
  wrap.appendChild(tbl);
}

function showDetail(brand, topic, uid){
  var d=TD.data[brand][topic];
  var wrap=document.getElementById(uid+'-det');
  if(!wrap)return;
  while(wrap.firstChild)wrap.removeChild(wrap.firstChild);

  var c=gc(brand,topic);
  var ps=d.twcs<0?(Math.abs(d.twcs)/(c/100)).toFixed(4):'N/A';
  var tcolor=TC[topic]||'#333';

  var box=el('div','border:2px solid '+tcolor+';border-radius:10px;padding:16px 20px');

  var ttl=el('div','font-size:14px;font-weight:700;color:'+tcolor+';margin-bottom:4px');
  ttl.textContent=topic+' — Step-by-step monthly calculation';
  box.appendChild(ttl);

  var meta=el('div','font-size:11px;color:#777;margin-bottom:12px;line-height:1.7');
  meta.innerHTML='Brand: <b>'+brand+'</b> &nbsp;|&nbsp; &rho;<sub>k</sub> = <b>'+d.rho_k+'</b> ('+d.rho_source+')'
    +' &nbsp;|&nbsp; S<sub>k,t</sub> = &minus;(|ABSA<sub>neg</sub>|&times;%Flag<sub>neg</sub> &minus; ABSA<sub>pos</sub>&times;%Flag<sub>pos</sub>)'
    +' &nbsp;|&nbsp; WS = S &times; &rho;<sub>k</sub><sup>&Delta;t</sup>';
  box.appendChild(meta);

  // Month-by-month table
  var tbl=document.createElement('table');
  tbl.style.cssText='width:100%;border-collapse:collapse;font-size:11px;margin-bottom:12px';

  var hrow='<thead><tr style="background:#f4f4f0;font-size:10px">'
    +'<th style="padding:6px 9px">Month</th>'
    +'<th style="padding:6px 9px;text-align:center">&Delta;t</th>'
    +'<th style="padding:6px 9px;text-align:center">Total n</th>'
    +'<th style="padding:6px 9px;text-align:center;color:#c0392b">NEG reviews</th>'
    +'<th style="padding:6px 9px;text-align:center;color:#c0392b">%Flag<sub>neg</sub></th>'
    +'<th style="padding:6px 9px;text-align:center;color:#c0392b">|ABSA<sub>neg</sub>|</th>'
    +'<th style="padding:6px 9px;text-align:center;color:#c0392b">NEG contrib<br><small>|ABSA|&times;%Flag</small></th>'
    +'<th style="padding:6px 9px;text-align:center;color:#27ae60">POS reviews</th>'
    +'<th style="padding:6px 9px;text-align:center;color:#27ae60">%Flag<sub>pos</sub></th>'
    +'<th style="padding:6px 9px;text-align:center;color:#27ae60">ABSA<sub>pos</sub></th>'
    +'<th style="padding:6px 9px;text-align:center;color:#27ae60">POS contrib<br><small>ABSA&times;%Flag</small></th>'
    +'<th style="padding:6px 9px;text-align:center">S<sub>k,t</sub><br><small>NEG&minus;POS</small></th>'
    +'<th style="padding:6px 9px;text-align:center">&rho;<sub>k</sub><sup>&Delta;t</sup><br><small>time weight</small></th>'
    +'<th style="padding:6px 9px;text-align:center">WS<br><small>S&times;weight</small></th>'
    +'</tr></thead>';
  tbl.innerHTML=hrow;

  var tbody=document.createElement('tbody');
  d.months.forEach(function(m,mi){
    var sc=m.S<0?'#c0392b':'#27ae60';
    var tr=document.createElement('tr');
    tr.style.background=mi%2?'#fafaf8':'#fff';
    tr.innerHTML='<td style="padding:5px 9px;font-weight:600">'+m.ym+'</td>'
      +'<td style="padding:5px 9px;text-align:center;color:#888">'+m.dt+'</td>'
      +'<td style="padding:5px 9px;text-align:center">'+m.n+'</td>'
      +'<td style="padding:5px 9px;text-align:center;color:#c0392b">'+m.neg_n+'</td>'
      +'<td style="padding:5px 9px;text-align:center;color:#c0392b">'+m.pct_neg+'%</td>'
      +'<td style="padding:5px 9px;text-align:center;color:#c0392b">'+Math.abs(m.absa_neg).toFixed(3)+'</td>'
      +'<td style="padding:5px 9px;text-align:center;color:#c0392b;font-weight:600">'+m.neg_k.toFixed(4)+'</td>'
      +'<td style="padding:5px 9px;text-align:center;color:#27ae60">'+m.pos_n+'</td>'
      +'<td style="padding:5px 9px;text-align:center;color:#27ae60">'+m.pct_pos+'%</td>'
      +'<td style="padding:5px 9px;text-align:center;color:#27ae60">'+m.absa_pos.toFixed(3)+'</td>'
      +'<td style="padding:5px 9px;text-align:center;color:#27ae60;font-weight:600">'+m.pos_k.toFixed(4)+'</td>'
      +'<td style="padding:5px 9px;text-align:center;font-weight:700;color:'+sc+'">'+m.S.toFixed(4)+'</td>'
      +'<td style="padding:5px 9px;text-align:center;color:#888">'+d.rho_k+'^'+m.dt+'='+m.w.toFixed(5)+'</td>'
      +'<td style="padding:5px 9px;text-align:center;font-weight:700;color:'+sc+'">'+m.WS.toFixed(5)+'</td>';
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);

  var tfoot=document.createElement('tfoot');
  tfoot.innerHTML='<tr style="background:#e8f0fb;font-weight:700;font-size:12px">'
    +'<td colspan="13" style="padding:7px 9px;text-align:right">TWCS = &Sigma;(WS) =</td>'
    +'<td style="padding:7px 9px;color:'+(d.twcs<0?'#c0392b':'#27ae60')+'">'+d.twcs.toFixed(4)+'</td></tr>'
    +'<tr style="background:#d4e8ff;font-weight:700;font-size:12px">'
    +'<td colspan="12" style="padding:7px 9px;text-align:right">PS = |'+d.twcs.toFixed(4)+'| &divide; ('+c+'% &divide; 100) =</td>'
    +'<td colspan="2" style="padding:7px 9px;color:#1a6bb5">'+ps+'</td></tr>';
  tbl.appendChild(tfoot);
  box.appendChild(tbl);

  var note=el('div','margin-top:10px;background:#fffbf0;border-left:3px solid #EF9F27;padding:9px 13px;font-size:11px;color:#555;line-height:1.7');
  note.innerHTML='<b>&Delta;t:</b> Months before Feb 2026 (0=current month, 1=last month, etc.) &nbsp;|&nbsp;'
    +'<b>NEG contrib = |ABSA<sub>neg</sub>| &times; %Flag<sub>neg</sub>:</b> Severity &times; frequency of complaints &nbsp;|&nbsp;'
    +'<b>POS contrib = ABSA<sub>pos</sub> &times; %Flag<sub>pos</sub>:</b> Strength &times; frequency of praise &nbsp;|&nbsp;'
    +'<b>S negative</b> = complaints dominate that month &nbsp;|&nbsp;'
    +'<b>&rho;<sub>k</sub><sup>&Delta;t</sup></b> = time weight: decays exponentially &nbsp;|&nbsp;'
    +'<b>TWCS more negative</b> = higher priority (before cost adjustment)';
  box.appendChild(note);
  wrap.appendChild(box);
}

// Build the page for all brands
function buildAll(){
  var root = document.getElementById('twcs-root');

  // Formula section (once, at top)
  var slFormula = el('div','font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#1a6bb5;border-bottom:2px solid #1a6bb5;padding-bottom:6px;margin:0 0 20px');
  slFormula.textContent = 'How the formula works';
  root.appendChild(slFormula);
  root.appendChild(buildFormulaSection());

  // Brand selector
  var tabs = el('div','display:flex;gap:0;border-bottom:2px solid #ddd;margin-bottom:24px');
  var brandSections = {};

  BRANDS.forEach(function(brand, bi){
    var tab = el('div','padding:10px 20px;cursor:pointer;font-weight:600;font-size:13px;color:#888;border-bottom:3px solid transparent;margin-bottom:-2px');
    tab.textContent = brand;
    tab.dataset.brand = brand;

    tab.addEventListener('click', function(){
      tabs.querySelectorAll('[data-brand]').forEach(function(t){
        t.style.color='#888'; t.style.borderBottomColor='transparent';
      });
      this.style.color='#1a1a2e'; this.style.borderBottomColor='#1a6bb5';
      Object.keys(brandSections).forEach(function(b){ brandSections[b].style.display='none'; });
      brandSections[brand].style.display='block';
    });

    if(bi===0){ tab.style.color='#1a1a2e'; tab.style.borderBottomColor='#1a6bb5'; }
    tabs.appendChild(tab);

    // Brand section
    var bsec = el('div', bi===0?'':'display:none');
    var slRho = el('div','font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#888;border-bottom:1px solid #ddd;padding-bottom:6px;margin:0 0 14px');
    slRho.textContent = 'Temporal decay (rho_k) — ' + brand;
    bsec.appendChild(slRho);
    bsec.appendChild(buildRhoTable(brand));

    var slPri = el('div','font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#1a6bb5;border-bottom:2px solid #1a6bb5;padding-bottom:6px;margin:24px 0 14px');
    slPri.textContent = 'Priority tool — ' + brand;
    bsec.appendChild(slPri);
    bsec.appendChild(buildPriorityTool(brand, 'uid-'+brand.replace(/ /g,'_')));

    brandSections[brand] = bsec;
    root.appendChild(bsec);
  });

  // tabs built, now insert before first brand section
  // brand sections already appended, move tabs before them
  var firstSection = brandSections[BRANDS[0]];
  root.insertBefore(tabs, firstSection);
}

buildAll();
</script>
