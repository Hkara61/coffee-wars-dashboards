function ac(v){if(v>=1)return'#1D9E75';if(v>=0)return'#5aab8a';if(v>=-0.5)return'#EF9F27';if(v>=-1.5)return'#E24B4A';return'#9b2121';}
function abg(v){if(v>=1)return'#eaf6f1';if(v>=0)return'#f2faf6';if(v>=-0.5)return'#fff8ec';if(v>=-1.5)return'#fdf3f3';return'#faeaea';}
function lc(s){return s==='neg'?'lda-neg':s==='pos'?'lda-pos':'lda-neu';}
function navg(arr){const f=arr.filter(v=>v!==null);return f.length?f.reduce((a,b)=>a+b,0)/f.length:null;}

function mkPie(id,bname){
  if(CHS[id]){CHS[id].destroy();delete CHS[id];}
  const el=document.getElementById(id);if(!el)return;
  const d=CATS.map(c=>{const v=CP[bname][c].filter(x=>x!==null);return v.length?v.reduce((a,b)=>a+b,0)/v.length:0;});
  const piePlugin={id:'pieLabels',afterDatasetDraw(chart){
    const{ctx,data}=chart;
    const ds=chart.getDatasetMeta(0);
    const total=data.datasets[0].data.reduce((a,b)=>a+b,0);
    ds.data.forEach((arc,i)=>{
      const val=data.datasets[0].data[i];
      const pct=(val/total*100);
      if(pct<4)return;
      const angle=(arc.startAngle+arc.endAngle)/2;
      const r=(arc.innerRadius+arc.outerRadius)/2;
      const x=arc.x+Math.cos(angle)*r;
      const y=arc.y+Math.sin(angle)*r;
      ctx.save();
      ctx.fillStyle='#fff';
      ctx.font='bold 10px -apple-system,sans-serif';
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      ctx.shadowColor='rgba(0,0,0,0.3)';
      ctx.shadowBlur=2;
      ctx.fillText(pct.toFixed(1)+'%',x,y);
      ctx.restore();
    });
  }};
  CHS[id]=new Chart(el,{type:'doughnut',data:{labels:CATS,datasets:[{data:d,backgroundColor:PC,borderWidth:1.5,borderColor:'#fff'}]},
    plugins:[piePlugin],
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:true,position:'right',labels:{font:{size:10},boxWidth:10,padding:5}},
        tooltip:{callbacks:{label:c=>`${c.label}: ${c.parsed.toFixed(1)}%`}}
      }}});
}

// ---- Utility functions ----
function sigStar(p){
  if(p<0.001)return'★★★ (p<0.001)';
  if(p<0.01)return'★★ (p<0.01)';
  if(p<0.05)return'★ (p<0.05)';
  return'ns';
}
function sigColor(p,coef){
  if(p>=0.05)return'#aaa';
  return coef>=0?'#1D9E75':'#E24B4A';
}
function kwBadge(kw,label){
  if(!kw||kw.H===null)return'<div style="font-size:11px;color:#aaa;padding:8px 0">'+label+': insufficient data</div>';
  const col=kw.sig?'#1D9E75':'#e74c3c';
  const v=kw.sig?'✓ Statistically significant — this pattern is real, not random chance':'✗ Not statistically significant — variation may be due to chance';
  const pct=(kw.p*100).toFixed(1);
  const meaning=kw.sig
    ?'p='+kw.p+' means only a '+pct+'% probability this result occurred by random variation.'
    :'p='+kw.p+' — above the 0.05 threshold. Pattern exists but cannot be confirmed as non-random with this sample size.';
  return'<div style="background:'+col+'12;border:1px solid '+col+'33;padding:10px 14px;border-radius:8px;font-size:11px;margin:6px 0"><div style="color:'+col+';font-weight:700;margin-bottom:4px">'+v+'</div><div style="color:#444">'+label+': H='+kw.H+', p='+kw.p+'</div><div style="color:#666;margin-top:4px;font-size:10px">'+meaning+' · Kruskal-Wallis test checks whether any group differs from others. p &lt; 0.05 = 95% confident the difference is genuine.</div></div>';
}
function sigBadge(p,sig){
  if(p===null||p===undefined)return'<span style="color:#aaa;font-size:10px">n/a</span>';
  const col=sig?'#1D9E75':'#999';
  const tip=sig?'Statistically significant (p='+p+') — this difference is real. Less than 5% chance of random occurrence.':'p='+p+' — not statistically significant. The difference may exist but cannot be confirmed.';
  return'<span style="color:'+col+';font-size:10px;font-weight:'+(sig?700:400)+'" title="'+tip+'">'+(sig?'★ ':'')+' p='+p+'</span>';
}

        <th style="padding:10px;text-align:left;font-size:11px;font-weight:700;color:#333;border-bottom:1px solid #ddd">Category</th>
        <th style="padding:10px;text-align:left;font-size:11px;font-weight:700;color:#333;border-bottom:1px solid #ddd">Type</th>
        <th style="padding:10px;text-align:left;font-size:11px;font-weight:700;color:#333;border-bottom:1px solid #ddd">Coefficient</th>
        <th style="padding:10px;text-align:left;font-size:11px;font-weight:700;color:#333;border-bottom:1px solid #ddd">Std. Error</th>
        <th style="padding:10px;text-align:left;font-size:11px;font-weight:700;color:#333;border-bottom:1px solid #ddd">t-stat</th>
        <th style="padding:10px;text-align:left;font-size:11px;font-weight:700;color:#333;border-bottom:1px solid #ddd">p-value</th>
        <th style="padding:10px;text-align:left;font-size:11px;font-weight:700;color:#333;border-bottom:1px solid #ddd">Sig.</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;

  return equation + expl + table;
}

// ============================================================
// RADAR & TOTAL CHART RENDERERS
// ============================================================

function makeRChart(id, pos, neg) {
  if (RCHS[id]) { RCHS[id].destroy(); delete RCHS[id]; }
  const el = document.getElementById(id);
  if (!el) return;
  RCHS[id] = new Chart(el, {
    type: 'radar',
    data: {
      labels: RADAR_CATS.map(c => c.length > 14 ? c.replace(' ','\n') : c),
      datasets: [
        { label:'Positive %', data:pos, backgroundColor:'rgba(29,158,117,0.18)',
          borderColor:'#1D9E75', borderWidth:2, pointRadius:0, pointHoverRadius:0 },
        { label:'Negative %', data:neg, backgroundColor:'rgba(224,75,74,0.18)',
          borderColor:'#E24B4A', borderWidth:2, pointRadius:0, pointHoverRadius:0 }
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:true,
      elements:{ point:{radius:0}, line:{tension:0} },
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${(c.parsed.r||0).toFixed(1)}%`}}
      },
      scales:{r:{
        min:0, max:35,
        ticks:{font:{size:9,weight:'600'},color:'#555',stepSize:5,
               backdropColor:'transparent',callback:v=>v+'%'},
        grid:{color:'rgba(0,0,0,.12)'},
        angleLines:{color:'rgba(0,0,0,.12)'},
        pointLabels:{font:{size:9,weight:'700'},color:'#333'}
      }}
    }
  });
}

function makeTChart(id, bname, col) {
  if (RCHS[id]) { RCHS[id].destroy(); delete RCHS[id]; }
  const el = document.getElementById(id);
  if (!el) return;
  const data = TOTALS[bname] || {};
  const years = RADAR_YEARS.filter(y => data[y]);
  RCHS[id] = new Chart(el, {
    type:'bar',
    data:{
      labels:years,
      datasets:[
        { label:'Positive flags / 100 reviews',
          data:years.map(y=>data[y].pos_rate),
          backgroundColor:'rgba(29,158,117,0.75)', borderColor:'#1D9E75',
          borderWidth:1, borderRadius:3 },
        { label:'Negative flags / 100 reviews',
          data:years.map(y=>data[y].neg_rate),
          backgroundColor:'rgba(224,75,74,0.75)', borderColor:'#E24B4A',
          borderWidth:1, borderRadius:3 }
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:true,position:'bottom',
                labels:{font:{size:11,weight:'600'},boxWidth:10,padding:8}}},
      scales:{
        x:{ticks:{font:{size:11,weight:'600'},color:'#333'},grid:{display:false}},
        y:{ticks:{font:{size:11,weight:'600'},color:'#333'},
           grid:{color:'rgba(0,0,0,.06)'},
           title:{display:true,text:'Flags / 100 reviews',
                  font:{size:11,weight:'600'},color:'#444'}}
      }
    }
  });
}

// ============================================================
// EXPERIENCE BAR SECTION
// ============================================================
function buildExpSection(bname, bid, M) {
  const d = BAR[bname];
  if (!d) return '';
  const cats = RADAR_CATS.slice().reverse();
  const allNums = RADAR_CATS.flatMap(c=>[d[c]?.pos_n||0, d[c]?.neg_n||0]);
  const maxN = Math.max(...allNums, 1);

  const expl = `<div style="background:#f8f8f5;border-radius:10px;padding:14px 18px;
      margin-bottom:14px;border:0.5px solid #e0e0d8;font-size:12px;color:#444;line-height:1.7">
    <strong style="color:#222;font-size:13px">How to read — Experience Analysis</strong><br>
    Each bar = total mentions of that category (positive or negative). Longer = more customers wrote about it.
    <strong>A</strong> = average ABSA score for those mentions.
    Long red bar + strongly negative A = high volume complaint + high intensity = top operational priority.
  </div>`;

  const rows = cats.map(cat => {
    const cd = d[cat] || {pos_n:0, neg_n:0, pos_absa:0, neg_absa:0};
    const pw = Math.round(cd.pos_n / maxN * 260);
    const nw = Math.round(cd.neg_n / maxN * 260);
    return `<div style="display:grid;grid-template-columns:155px 1fr 1fr;gap:8px;
        align-items:center;padding:6px 0;border-bottom:0.5px solid #f0f0ec">
      <div style="font-size:12px;font-weight:600;color:#222">${cat}</div>
      <div style="display:flex;align-items:center;gap:8px">
        <div style="background:#1D9E75;height:22px;width:${pw}px;border-radius:3px;min-width:4px"></div>
        <span style="font-size:11px;color:#1D9E75;font-weight:600;white-space:nowrap">
          ${cd.pos_n} &nbsp;(A: ${cd.pos_absa})</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div style="background:#E24B4A;height:22px;width:${nw}px;border-radius:3px;min-width:4px"></div>
        <span style="font-size:11px;color:#E24B4A;font-weight:600;white-space:nowrap">
          ${cd.neg_n} &nbsp;(A: ${cd.neg_absa})</span>
      </div>
    </div>`;
  }).join('');

  return expl + `<div style="background:#fff;border-radius:10px;padding:16px;border:0.5px solid #e0e0d8">
    <div style="font-size:14px;font-weight:700;color:#111;margin-bottom:4px">
      ${bname} — Experience Analysis (all years combined)</div>
    <div style="font-size:12px;color:#666;margin-bottom:14px">
      Total mentions by category · Green = positive · Red = negative · A = avg ABSA score</div>
    <div style="display:grid;grid-template-columns:155px 1fr 1fr;gap:8px;margin-bottom:10px">
      <div style="font-size:11px;font-weight:700;color:#444;text-transform:uppercase">Category</div>
      <div style="font-size:11px;font-weight:700;color:#1D9E75;text-transform:uppercase">▲ Positive mentions</div>
      <div style="font-size:11px;font-weight:700;color:#E24B4A;text-transform:uppercase">▼ Negative mentions</div>
    </div>
    ${rows}
  </div>`;
}

// ============================================================
// RADAR SECTION
// ============================================================

function buildRadarSection(bname, bid, M) {
  const brandData = RADAR[bname] || {};
  const exp = BRAND_EXP[bname] || {};
  const avail = RADAR_YEARS.filter(y => brandData[y] && brandData[y].n >= 5);
  if (!avail.length) return '';

  const expBox = `<div style="background:#f8f8f5;border-radius:10px;padding:14px 18px;
      margin-bottom:16px;border:0.5px solid #e0e0d8">
    <div style="font-size:12px;color:#333;line-height:1.7;margin-bottom:12px">
      Each axis = one ABSA category. <strong style="color:#1D9E75">Green &gt; Red</strong>
      = relative strength. <strong style="color:#E24B4A">Red &gt; Green</strong> = weakness.
      Values = % share of ALL positives or negatives that year (so axes sum to ~100% per colour).
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
      <div style="background:#f0fdf4;border-radius:8px;padding:10px 12px;border-left:3px solid #1D9E75">
        <div style="font-size:11px;font-weight:700;color:#1D9E75;text-transform:uppercase;margin-bottom:4px">Positive drivers</div>
        <div style="font-size:12px;color:#333;line-height:1.6">${exp.pos||''}</div>
      </div>
      <div style="background:#fdf3f3;border-radius:8px;padding:10px 12px;border-left:3px solid #E24B4A">
        <div style="font-size:11px;font-weight:700;color:#E24B4A;text-transform:uppercase;margin-bottom:4px">Negative drivers</div>
        <div style="font-size:12px;color:#333;line-height:1.6">${exp.neg||''}</div>
      </div>
      <div style="background:#f4f4f0;border-radius:8px;padding:10px 12px;border-left:3px solid #888">
        <div style="font-size:11px;font-weight:700;color:#555;text-transform:uppercase;margin-bottom:4px">2020–2026 trend</div>
        <div style="font-size:12px;color:#333;line-height:1.6">${exp.trend||''}</div>
      </div>
    </div>
  </div>`;

  const legend = `<div style="display:flex;gap:20px;margin-bottom:12px;font-size:12px;color:#333;flex-wrap:wrap">
    <span style="display:flex;align-items:center;gap:6px">
      <span style="display:inline-block;width:18px;height:3px;background:#1D9E75"></span>
      <strong>Positive reviews</strong> — % share of all positives that year</span>
    <span style="display:flex;align-items:center;gap:6px">
      <span style="display:inline-block;width:18px;height:3px;background:#E24B4A"></span>
      <strong>Negative reviews</strong> — % share of all negatives that year</span>
  </div>`;

  const sumCard = `<div style="background:#fff;border-radius:10px;padding:16px;
      border:0.5px solid #e0e0d8;display:flex;flex-direction:column;height:100%">
    <div style="font-size:13px;font-weight:700;color:#111;margin-bottom:2px">
      Total positive vs negative flags</div>
    <div style="font-size:12px;color:#666;margin-bottom:10px">2020–2026 · per 100 reviews</div>
    <div style="flex:1;position:relative;min-height:180px">
      <canvas id="rc-total-${bid}"></canvas></div>
    <div style="font-size:11px;color:#666;margin-top:8px;line-height:1.5">
      Multiple categories can be flagged per review so values can exceed 100.
      A widening gap = worsening sentiment.</div>
  </div>`;

  const yCard = yr => {
    const yd = brandData[yr];
    return `<div style="background:#fff;border-radius:10px;padding:14px;
        border:0.5px solid #e0e0d8;text-align:center">
      <div style="font-size:14px;font-weight:700;color:${M.color};margin-bottom:2px">${yr}</div>
      <div style="font-size:12px;color:#666;margin-bottom:8px">N = ${yd.n}</div>
      <canvas id="rc-${bid}-${yr}"></canvas>
    </div>`;
  };

  const r1 = avail.slice(0,4);
  const r2 = avail.slice(4);
  const span = 4 - r2.length;
  return expBox + legend
    + `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px">
        ${r1.map(y=>yCard(y)).join('')}</div>`
    + `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px">
        ${r2.map(y=>yCard(y)).join('')}
        <div style="grid-column:span ${span}">${sumCard}</div></div>`;
}

// ============================================================
// REGRESSION SECTION
// ============================================================
function buildRegSection(bname, bid, M) {
  const r = REG[bname];
  if (!r) return '';

  const fitMsg = r.r2 > 0.6
    ? 'Strong model fit — flagged categories explain more than 60% of sentiment variance.'
    : 'Moderate fit — significant predictors but other factors also influence sentiment.';

  const topCoefs = Object.entries(r.coefficients)
    .filter(([,v]) => v.sig && Math.abs(v.coef) > 0.3)
    .slice(0,5)
    .map(([k,v]) =>
      `<span style="color:${v.coef>0?'#1D9E75':'#E24B4A'};font-weight:600">
        + (${v.coef}) × ${k}</span>`)
    .join('');

  const rows = Object.entries(r.coefficients).map(([k,v]) => {
    const isP = k.startsWith('POS');
    const cat = k.replace('POS ','').replace('NEG ','');
    const bg = v.sig ? (isP ? '#f0fdf4' : '#fdf3f3') : '#fafafa';
    const cc = v.sig ? (v.coef>0 ? '#1D9E75' : '#E24B4A') : '#999';
    const st = v.sig999?'★★★': v.sig99?'★★': v.sig?'★':'';
    const sc = v.sig999?'#1a8a4a': v.sig99?'#1D9E75': v.sig?'#5aab8a':'#ccc';
    return `<tr style="background:${bg}">
      <td style="padding:8px 10px;font-weight:700;color:${isP?'#1D9E75':'#E24B4A'};font-size:12px">
        ${isP?'↑':'↓'} ${cat}</td>
      <td style="padding:8px 10px;font-size:12px;color:#555">${isP?'Positive':'Negative'}</td>
      <td style="padding:8px 10px;font-weight:700;color:${cc};font-size:13px">${v.coef}</td>
      <td style="padding:8px 10px;font-size:12px;color:#666">±${v.se}</td>
      <td style="padding:8px 10px;font-size:12px;color:#666">${v.t}</td>
      <td style="padding:8px 10px;font-size:12px;color:#666">${v.p}</td>
      <td style="padding:8px 10px;font-weight:700;color:${sc};font-size:14px">${st}</td>
    </tr>`;
  }).join('');

  return `<div style="background:#f8f8f5;border-radius:10px;padding:16px 20px;
      margin-bottom:14px;border:0.5px solid #e0e0d8">
    <div style="font-size:14px;font-weight:700;color:#111;margin-bottom:8px">
      Regression Equation — OLS (Ordinary Least Squares)</div>
    <div style="font-size:12px;color:#444;line-height:1.7;margin-bottom:10px">
      ABSA Score = Intercept + Σ(coefficient × flag) &nbsp;·&nbsp;
      <strong>R² = <span style="color:${M.color}">${r.r2}</span></strong>
      &nbsp;·&nbsp; N = ${r.n}<br>
      <span style="color:#1D9E75">${fitMsg}</span>
    </div>
    <div style="font-size:12px;color:#333;background:#fff;border-radius:6px;
        padding:10px 14px;border:0.5px solid #e0e0d8">
      <strong>ABSA = ${r.intercept}</strong>${topCoefs} + …
    </div>
  </div>
  <div style="background:#fff;border-radius:8px;padding:12px 16px;margin-bottom:14px;
      border:0.5px solid #e0e0d8;font-size:12px;color:#333;line-height:1.75">
    <strong>How to read:</strong> Coefficient = how much overall ABSA changes when a review is
    flagged in that category. ★ p&lt;0.05 · ★★ p&lt;0.01 · ★★★ p&lt;0.001.
    Higher |t| = stronger evidence. Un-starred = may be coincidental.
  </div>
  <div style="background:#fff;border-radius:10px;overflow:hidden;border:0.5px solid #e0e0d8">
    <table style="width:100%;border-collapse:collapse">
      <thead><tr style="background:#ededea">
        <th style="padding:10px;text-align:left;font-size:12px;font-weight:700;color:#222;border-bottom:1px solid #ddd">Category</th>
        <th style="padding:10px;text-align:left;font-size:12px;font-weight:700;color:#222;border-bottom:1px solid #ddd">Type</th>
        <th style="padding:10px;text-align:left;font-size:12px;font-weight:700;color:#222;border-bottom:1px solid #ddd">Coefficient</th>
        <th style="padding:10px;text-align:left;font-size:12px;font-weight:700;color:#222;border-bottom:1px solid #ddd">Std Error</th>
        <th style="padding:10px;text-align:left;font-size:12px;font-weight:700;color:#222;border-bottom:1px solid #ddd">t-stat</th>
        <th style="padding:10px;text-align:left;font-size:12px;font-weight:700;color:#222;border-bottom:1px solid #ddd">p-value</th>
        <th style="padding:10px;text-align:left;font-size:12px;font-weight:700;color:#222;border-bottom:1px solid #ddd">Sig</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}
